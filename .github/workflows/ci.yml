name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just ci-check

  version:
    name: Compute Version
    runs-on: ubuntu-latest
    needs: [build-test]
    if: github.event_name == 'push'
    outputs:
      version: ${{ steps.calc.outputs.version }}
      do_release: ${{ steps.calc.outputs.do_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@just
      - id: calc
        run: just ci-version >> "$GITHUB_OUTPUT"

  release:
    name: Tag & GitHub Release
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.do_release == 'true'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@just
      - name: Create release
        run: |
          IS_PRE=false
          if [[ "${{ needs.version.outputs.version }}" == *-* ]]; then
            IS_PRE=true
          fi
          just ci-release "${{ needs.version.outputs.version }}" "$IS_PRE"

  publish-crates:
    name: Publish → crates.io
    runs-on: ubuntu-latest
    needs: [version, release]
    if: needs.version.outputs.do_release == 'true'
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - run: just ci-set-version "${{ needs.version.outputs.version }}"
      - run: just ci-publish
